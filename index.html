<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CaCaw - Wingspan Bird Sound Scanner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐦</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>CaCaw</h1>
            <p class="subtitle">Wingspan Bird Sound Scanner</p>
        </header>

        <main>
            <!-- Camera / Capture View -->
            <div id="camera-section">
                <div id="video-container">
                    <video id="camera" autoplay playsinline></video>
                    <canvas id="overlay" class="hidden"></canvas>
                    <div id="camera-placeholder">
                        <div class="placeholder-icon">📷</div>
                        <p>Tap below to start camera</p>
                    </div>
                </div>

                <div id="controls">
                    <button id="start-camera-btn" class="btn btn-primary">Start Camera</button>
                    <button id="capture-btn" class="btn btn-capture hidden">
                        <span class="capture-ring"></span>
                    </button>
                    <button id="upload-btn" class="btn btn-secondary">Upload Photo</button>
                    <input type="file" id="file-input" accept="image/*" capture="environment" class="hidden">
                </div>
            </div>

            <!-- Result View -->
            <div id="result-section" class="hidden">
                <div id="captured-image-container">
                    <img id="captured-image" alt="Captured card">
                </div>

                <div id="status">
                    <div id="loading" class="hidden">
                        <div class="spinner"></div>
                        <p id="loading-text">Scanning card...</p>
                    </div>
                </div>

                <div id="bird-result" class="hidden">
                    <div class="bird-info">
                        <h2 id="bird-name"></h2>
                        <p id="bird-scientific" class="scientific-name"></p>
                    </div>

                    <div id="audio-player" class="hidden">
                        <div class="audio-controls">
                            <button id="play-btn" class="btn btn-play">
                                <span class="play-icon">&#9654;</span>
                            </button>
                            <div class="audio-info">
                                <p id="recording-info"></p>
                                <div id="audio-progress">
                                    <div id="audio-progress-bar"></div>
                                </div>
                            </div>
                        </div>
                        <audio id="bird-audio"></audio>
                    </div>

                    <div id="no-sound" class="hidden">
                        <p>No recordings found for this bird.</p>
                    </div>
                </div>

                <div id="error-message" class="hidden">
                    <p id="error-text"></p>
                </div>

                <div id="result-controls">
                    <button id="scan-again-btn" class="btn btn-primary">Scan Another Card</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Point your camera at a Wingspan card to hear the bird's call</p>
            <p class="credits">Sounds from <a href="https://xeno-canto.org" target="_blank">Xeno-canto</a></p>
        </footer>
    </div>

    <!-- Hidden canvas for image processing -->
    <canvas id="processing-canvas" class="hidden"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
